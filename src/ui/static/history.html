<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run History — T-Shirt MAS</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 { font-size: 1.8rem; color: #2c3e50; margin-bottom: 8px; }
  .subtitle { color: #7f8c8d; margin-bottom: 24px; }
  #run-list { list-style: none; }
  #run-list li {
    padding: 14px 16px;
    margin: 8px 0;
    background: #f8f9fa;
    border-radius: 10px;
    border-left: 4px solid #667eea;
    transition: background 0.15s;
  }
  #run-list li:hover { background: #eef0ff; }
  #run-list a {
    text-decoration: none;
    color: #2c3e50;
    font-weight: 600;
    display: block;
  }
  #run-list .run-id { font-size: 0.9rem; color: #667eea; }
  .back-link {
    display: inline-block;
    margin-top: 24px;
    color: #667eea;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  .loading { color: #7f8c8d; text-align: center; padding: 20px; }
  .empty { color: #7f8c8d; text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Run History</h1>
  <p class="subtitle">Past simulation runs stored in Postgres checkpoints</p>

  <ul id="run-list" hx-get="/api/history" hx-trigger="load" hx-swap="innerHTML">
    <li class="loading">Loading runs…</li>
  </ul>

  <a href="/" class="back-link">← Back to Start</a>
</div>
</body>
</html>
