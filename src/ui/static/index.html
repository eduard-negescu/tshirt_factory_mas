<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Shirt Factory MAS</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 48px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    color: #2c3e50;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #7f8c8d;
    margin-bottom: 32px;
    font-size: 0.95rem;
  }
  .form-group {
    margin-bottom: 20px;
    text-align: left;
  }
  label {
    display: block;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 6px;
    font-size: 0.9rem;
  }
  input[type="number"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1rem;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: #667eea;
  }
  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 14px 48px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 12px;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102,126,234,0.4);
  }
  .nav {
    margin-top: 24px;
  }
  .nav a {
    color: #667eea;
    text-decoration: none;
    font-size: 0.9rem;
    margin: 0 8px;
  }
  .nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <h1>🏭 T-Shirt Factory</h1>
  <p class="subtitle">Multi-Agent Simulation with Live Animation</p>

  <form hx-get="/live" hx-target="body" hx-push-url="true">
    <div class="form-group">
      <label for="order_count">Number of Orders</label>
      <input type="number" id="order_count" name="order_count" value="10" min="1" max="50">
    </div>
    <div class="form-group">
      <label for="urgent_ratio">Urgent Ratio</label>
      <input type="number" id="urgent_ratio" name="urgent_ratio" value="0.3" min="0" max="1" step="0.1">
    </div>
    <button type="submit">▶ Start Simulation</button>
  </form>

  <div class="nav">
    <a href="/history">📋 View Past Runs</a>
  </div>
</div>
</body>
</html>
