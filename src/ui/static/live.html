<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Factory — T-Shirt MAS</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:#1a1a2e; color:#eee; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  #top-bar { background:#16213e; padding:8px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #0f3460; flex-shrink:0; }
  #top-bar h2 { font-size:1.1rem; color:#e94560; }
  #stats { display:flex; gap:20px; font-size:0.85rem; }
  .stat { text-align:center; }
  .stat .val { font-size:1.2rem; font-weight:bold; color:#e94560; }
  .stat .lbl { color:#8899aa; font-size:0.7rem; text-transform:uppercase; }
  #main { display:flex; flex:1; min-height:0; }
  #canvas-wrap { flex:1; position:relative; }
  canvas { display:block; width:100%; height:100%; }
  #sidebar { width:300px; background:#16213e; border-left:1px solid #0f3460; display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
  #sidebar h3 { padding:12px 16px; font-size:0.85rem; color:#e94560; border-bottom:1px solid #0f3460; text-transform:uppercase; letter-spacing:1px; }
  #queue-list, #reason-panel, #log-panel { padding:12px 16px; border-bottom:1px solid #0f3460; }
  #queue-list .order { padding:4px 8px; margin:2px 0; border-radius:4px; font-size:0.8rem; background:#0f3460; display:inline-block; margin-right:4px; }
  .order.urgent { border-left:3px solid #e94560; }
  #reason-text { font-size:0.8rem; color:#8899aa; font-style:italic; line-height:1.4; }
  #log-panel { flex:1; overflow-y:auto; }
  #log-entries { font-size:0.75rem; }
  .log-entry { padding:3px 0; border-bottom:1px solid #0f346022; color:#8899aa; }
  .log-entry.important { color:#e94560; }
</style>
</head>
<body>
<div id="top-bar">
  <h2>🏭 Live Factory</h2>
  <div id="stats">
    <div class="stat"><div class="val" id="stat-completed">0</div><div class="lbl">Completed</div></div>
    <div class="stat"><div class="val" id="stat-iteration">0</div><div class="lbl">Iteration</div></div>
    <div class="stat"><div class="val" id="stat-replan">0</div><div class="lbl">Re-plans</div></div>
  </div>
</div>
<div id="main">
  <div id="canvas-wrap"><canvas id="factory-canvas"></canvas></div>
  <div id="sidebar">
    <h3>📋 Queue</h3>
    <div id="queue-list"></div>
    <h3>🧠 Scheduler Reasoning</h3>
    <div id="reason-panel"><div id="reason-text">Waiting for scheduler...</div></div>
    <h3>📝 Activity</h3>
    <div id="log-panel"><div id="log-entries"></div></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
